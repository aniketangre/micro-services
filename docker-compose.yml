services:

  qdrant:
    image: qdrant/qdrant:v1.9.3
    ports:
      - "6333:6333"   # REST + gRPC
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      QDRANT_HOST: qdrant
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
      USE_RERANKER: "true"
      CHUNK_SIZE: "512"
      CHUNK_OVERLAP: "64"
      RETRIEVAL_TOP_K: "8"
      RERANK_TOP_N: "3"
      SCORE_THRESHOLD: "0.70"
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn rag_pipeline.api:app --host 0.0.0.0 --port 8000 --workers 1

volumes:
  qdrant_data:
